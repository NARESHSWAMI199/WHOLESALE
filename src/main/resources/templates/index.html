<!DOCTYPE html>
<html>
<head>
    <title>Hello WebSocket</title>
    <link crossorigin="anonymous" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
          integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" rel="stylesheet">
    <link href="/main.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
</head>
<body>
<noscript><h2 style="color: #ff0000">Seems your browser doesn't support Javascript! Websocket relies on Javascript being
    enabled. Please enable
    Javascript and reload this page!</h2></noscript>
<div class="container" id="main-content">
    <div class="row">
        <div class="col-md-6">
            <form class="form-inline">
                <div class="form-group">
                    <label for="connect">WebSocket connection:</label>
                    <button class="btn btn-default" id="connect" type="submit">Connect</button>
                    <button class="btn btn-default" id="private" type="submit">Join private Chat</button>
                    <button class="btn btn-default" disabled="disabled" id="disconnect" type="submit">Disconnect
                    </button>
                </div>
            </form>
        </div>
        <div class="col-md-6">
            <form class="form-inline">
                <div class="form-group">
                    <label for="name">What is your name?</label>
                    <input class="form-control" id="name" placeholder="Your name here..." type="text">
                </div>
                <button class="btn btn-default" id="send" type="submit">Send</button>
            </form>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <table class="table table-striped" id="conversation">
                <thead>
                <tr>
                    <th>Greetings</th>
                </tr>
                </thead>
                <tbody id="greetings">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.cookie = 'X-Username=naresh; path=/'
    const stompClient = new StompJs.Client({
        brokerURL: 'ws://localhost:8080/chat'
    });

    stompClient.onConnect = (frame) => {
        setConnected(true);
        console.safeLog('Connected: ' + frame);
        stompClient.subscribe('/user/naresh/queue/private', (greeting) => {
            showGreeting(JSON.parse(greeting.body).message);
        });
    };

    stompClient.onWebSocketError = (error) => {
        console.error('Error with websocket', error);
    };

    stompClient.onStompError = (frame) => {
        console.error('Broker reported error: ' + frame.headers['message']);
        console.error('Additional details: ' + frame.body);
    };

    function setConnected(connected) {
        $("#connect").prop("disabled", connected);
        $("#disconnect").prop("disabled", !connected);
        if (connected) {
            $("#conversation").show();
        }
        else {
            $("#conversation").hide();
        }
        $("#greetings").html("");
    }

    function connect() {
        stompClient.activate();
    }

    function disconnect() {
        stompClient.deactivate();
        setConnected(false);
        console.safeLog("Disconnected");
    }

    function sendMessage() {
        stompClient.publish({
            destination: "/app/chat/private/rakesh",
            body: JSON.stringify({'message': $("#name").val()})
        });
    }

    function joinPrivate() {
        let message = $("#name").val();
        stompClient.publish({
            destination: "/app/add-private",
            body: JSON.stringify({'message': message })
        });
        showSenderMessage(message);
    }

    function showGreeting(message) {
        $("#greetings").append("<tr style='background : red; color : white; float : right'><td>" + message + "</td></tr>");
    }

    function showSenderMessage(message) {
        $("#greetings").append("<tr style='background : green; color ; white'><td>" + message + "</td></tr>");
    }


    $(function () {
        $("form").on('submit', (e) => e.preventDefault());
        $( "#connect" ).click(() => connect());
        $( "#private" ).click(() => joinPrivate());
        $( "#disconnect" ).click(() => disconnect());
        $( "#send" ).click(() => sendMessage());
    });
</script>
</body>
</html>
